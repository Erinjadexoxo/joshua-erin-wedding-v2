<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joshua & Erin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="hero-scene">

    <!-- Wooden Table -->
    <div class="table"></div>

    <!-- Linen -->
    <div class="linen"></div>

    <!-- Botanical Frame -->
    <div class="botanical botanical-top-left"></div>
    <div class="botanical botanical-top-right"></div>
    <div class="botanical botanical-bottom-left"></div>
    <div class="botanical botanical-bottom-right"></div>

    <!-- Envelope -->

    <div class="envelope-wrapper">

        <div class="envelope-shadow"></div>

        <div class="envelope">

            <div class="envelope-back"></div>

            <div class="envelope-flap"></div>

            <div class="wax-seal" id="seal">
                J&E
            </div>

            <div class="tap-text">
                Tap the seal
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
